name: Client Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - 'client-v*'

permissions:
  contents: read

jobs:
  build-client:
    name: Build ${{ matrix.label }} Client
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            label: macOS
            artifact: aimeeting-client-macos
          - runner: windows-latest
            label: Windows
            artifact: aimeeting-client-windows
          - runner: ubuntu-22.04
            label: Linux
            artifact: aimeeting-client-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            client/src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file \
            libfuse2 \
            rpm

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client bundles
        run: npm --prefix client run build

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          compression-level: 0
          path: |
            client/src-tauri/target/release/bundle/**/*.dmg
            client/src-tauri/target/release/bundle/**/*.app
            client/src-tauri/target/release/bundle/**/*.msi
            client/src-tauri/target/release/bundle/**/*.exe
            client/src-tauri/target/release/bundle/**/*.deb
            client/src-tauri/target/release/bundle/**/*.AppImage
            client/src-tauri/target/release/bundle/**/*.rpm

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/client-v')
    needs: build-client
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aimeeting-client-*
          path: release-artifacts

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: AiMeeting Client ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.rpm